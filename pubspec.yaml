name: nfc_pet
description: "MVP Game Peliharaan NFC dengan Flutter dan Firebase"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  cloud_functions: ^5.0.2
  firebase_storage: ^12.0.1

  # NFC
  nfc_manager: ^3.3.0

  # 3D Model Viewer
  model_viewer_plus: ^1.7.0

  # State Management
  provider: ^6.1.1

  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/models/
